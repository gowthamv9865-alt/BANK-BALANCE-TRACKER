<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Bank Balance Tracker</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <!-- ===== HEADER / BALANCE SECTION ===== -->
    <header class="balance-card">
      <p class="balance-label">Current Balance</p>
      <h1 id="balanceAmount">₹0.00</h1>

      <div class="summary-row">
        <div class="summary-box credit-box">
          <span class="summary-title">Total Credited</span>
          <span id="totalCredited" class="summary-value">₹0.00</span>
        </div>
        <div class="summary-box debit-box">
          <span class="summary-title">Total Debited</span>
          <span id="totalDebited" class="summary-value">₹0.00</span>
        </div>
      </div>
    </header>

    <!-- ===== ADD TRANSACTION FORM ===== -->
    <section class="form-card">
      <h2>Add Transaction</h2>
      <form id="transactionForm">

        <div class="type-toggle">
          <button type="button" class="toggle-btn active" data-type="credit" id="creditBtn">
            + Credit (Money In)
          </button>
          <button type="button" class="toggle-btn" data-type="debit" id="debitBtn">
            − Debit (Money Out)
          </button>
        </div>

        <input type="hidden" id="transactionType" value="credit" />

        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input type="number" id="amount" placeholder="Enter amount" min="0.01" step="0.01" required />
        </div>

        <div class="form-group">
          <label for="note">Description / Note</label>
          <input type="text" id="note" placeholder="e.g. Salary, Grocery, Rent" required />
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" required />
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">Add Credit</button>
      </form>
    </section>

    <!-- ===== HISTORY SECTION ===== -->
    <section class="history-card">
      <div class="history-header">
        <h2>Transaction History</h2>
        <div class="filter-row">
          <select id="filterType">
            <option value="all">All</option>
            <option value="credit">Credited</option>
            <option value="debit">Debited</option>
          </select>
          <button id="clearAllBtn" class="clear-btn">Clear All</button>
        </div>
      </div>

      <ul id="transactionList" class="transaction-list">
        <!-- transactions injected here by JS -->
      </ul>

      <p id="emptyMessage" class="empty-message">No transactions yet. Add one above to get started.</p>
    </section>

  </div>

<script src="script.js"></script>
</body>
</html>
